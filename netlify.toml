[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Proxy /api/deals to our Netlify function
[[redirects]]
  from = "/api/deals"
  to = "/.netlify/functions/deals"
  status = 200

# Proxy /gg-api/* transparently to api.gg.deals/*
# This bypasses CORS because request appears to come from vaultdeals.io
[[redirects]]
  from = "/gg-api/*"
  to = "https://api.gg.deals/:splat"
  status = 200
  force = true
  headers = {X-From = "vaultdeals.io"}

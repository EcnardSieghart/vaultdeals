[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Netlify function proxy
[[redirects]]
  from = "/api/deals"
  to = "/.netlify/functions/deals"
  status = 200

# GG.deals proxy — bypasses CORS
[[redirects]]
  from = "/gg-api/*"
  to = "https://api.gg.deals/:splat"
  status = 200
  force = true

# GamerPower proxy — bypasses CORS
[[redirects]]
  from = "/gamerpower-api/*"
  to = "https://www.gamerpower.com/api/:splat"
  status = 200
  force = true

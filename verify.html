<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141210; color: #fafaf9; font-family: system-ui, sans-serif; font-size: 14px; padding: 32px; }
h1 { font-size: 20px; font-weight: 800; color: #f59e0b; margin-bottom: 6px; }
p { color: #78716c; margin-bottom: 24px; font-size: 13px; }
.progress { background: #1c1a17; border: 1px solid #2e2a24; border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
.progress-bar-wrap { flex: 1; background: #242018; border-radius: 100px; height: 8px; overflow: hidden; }
.progress-bar { height: 100%; background: #f59e0b; border-radius: 100px; transition: width .3s; width: 0%; }
.progress-label { font-size: 12px; color: #78716c; white-space: nowrap; min-width: 80px; text-align: right; }
.summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

.sum-n { font-size: 24px; font-weight: 800; display: block; }
.sum-l { font-size: 11px; color: #78716c; margin-top: 2px; }
.ok-n { color: #4ade80; }
.warn-n { color: #f59e0b; }
.err-n { color: #f87171; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: #78716c; font-weight: 600; padding: 8px 12px; border-bottom: 1px solid #2e2a24; text-transform: uppercase; letter-spacing: .05em; }
tr:nth-child(even) td { background: #1a1815; }
td { padding: 10px 12px; border-bottom: 1px solid #2e2a24; vertical-align: middle; }
.status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 4px; }
.s-ok   { background: #0d2a18; color: #4ade80; }
.s-warn { background: #2d1d02; color: #f59e0b; }
.s-err  { background: #2d0f0f; color: #f87171; }
.s-skip { background: #1c1a17; color: #78716c; }
.game-name { font-weight: 600; color: #fafaf9; }
.gg-name { color: #c4bdb4; }
.steam-id { font-size: 11px; color: #78716c; font-family: monospace; }
.price { color: #4ade80; font-weight: 600; }
.tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 4px; }
.t-indie { background: #1a0a2e; color: #c084fc; border: 1px solid rgba(192,132,252,.2); }
.t-aaa   { background: #2d1d02; color: #f59e0b; border: 1px solid rgba(245,158,11,.2); }
.filter-wrap { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { background: #1c1a17; border: 1px solid #2e2a24; color: #c4bdb4; padding: 6px 14px; border-radius: 100px; font-size: 12px; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: #2d1d02; border-color: rgba(245,158,11,.4); color: #f59e0b; }
#start-btn { background: #f59e0b; color: #141210; border: none; padding: 12px 28px; border-radius: 100px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 24px; }
#start-btn:disabled { opacity: .5; cursor: not-allowed; }
</style>

<h1>🔍 VaultDeals — Game ID Verifier</h1>
<p>Fetches GG.deals data for every tracked game and shows whether the Steam ID matches the expected title. Run this on the dev URL before merging to main.</p>

<button id="start-btn" onclick="runVerification()">Run verification</button>

<div class="progress" id="progress-wrap" style="display:none">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label">0 / 0</div>
</div>

<div class="summary" id="summary" style="display:none">
  <div class="sum-card"><span class="sum-n ok-n" id="s-ok">0</span><span class="sum-l">Matched</span></div>
  <div class="sum-card"><span class="sum-n warn-n" id="s-warn">0</span><span class="sum-l">Partial match</span></div>
  <div class="sum-card"><span class="sum-n err-n" id="s-err">0</span><span class="sum-l">Wrong game</span></div>
  <div class="sum-card"><span class="sum-n" style="color:#78716c" id="s-skip">0</span><span class="sum-l">No data</span></div>
</div>

<div class="filter-wrap" id="filter-wrap" style="display:none">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('ok',this)">Matched</button>
  <button class="filter-btn" onclick="setFilter('warn',this)">Partial</button>
  <button class="filter-btn" onclick="setFilter('err',this)">Wrong</button>
  <button class="filter-btn" onclick="setFilter('skip',this)">No data</button>
  <button class="filter-btn" onclick="setFilter('indie',this)">Indie only</button>
  <button class="filter-btn" onclick="setFilter('aaa',this)">AAA only</button>
</div>

      <th>Steam ID</th>
      <th>GG.deals returned</th>
      <th>Current price</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="results-body"></tbody>
</table>

var allResults = [];
var currentFilter = 'all';

async function runVerification(){
  var btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = 'Running…';
  allResults = [];

  // Deduplicate by steamId
  var seen = {};
  var unique = GAMES.filter(function(g){
    if(seen[g.steamId]) return false;
    seen[g.steamId] = true;
    return true;
  });

  document.getElementById('progress-wrap').style.display = 'flex';
  document.getElementById('summary').style.display = 'flex';
  document.getElementById('filter-wrap').style.display = 'flex';
  document.getElementById('results-table').style.display = 'table';

  var total = unique.length;
  var done = 0;

  var cfg;
  try {
    var cfgRes = await fetch('/api/deals');
    cfg = await cfgRes.json();
  } catch(e) {
    alert('Could not fetch API config. Make sure you are running this on the dev URL, not locally.');
    btn.disabled = false;
    btn.textContent = 'Run verification';
    return;
  }

  for(var b = 0; b < unique.length; b += 10){
    var batch = unique.slice(b, b + 10);
    var ids = batch.map(function(g){ return g.steamId; }).join(',');
    var url = cfg.apiBase + '?key=' + cfg.apiKey + '&ids=' + ids + '&region=us';
    var batchData = {};

    try {
      var res = await fetch(url);
      var json = JSON.parse(await res.text());
      if(json.success && json.data) batchData = json.data;
    } catch(e) {}

    batch.forEach(function(game){
      var info = batchData[game.steamId];
      var result = { game: game, ggTitle: info ? (info.title || '') : '', price: info && info.prices ? info.prices.currentRetail : null, status: 'skip' };

      if(info && info.title){
        var ggLower = info.title.toLowerCase();
        var words = game.title.toLowerCase().split(' ').filter(function(w){ return w.length > 3; });
        var matched = words.filter(function(w){ return ggLower.indexOf(w) >= 0; }).length;
        if(matched === words.length) result.status = 'ok';
        else if(matched > 0) result.status = 'warn';
        else result.status = 'err';
      }

      allResults.push(result);
      done++;
    });

    document.getElementById('progress-bar').style.width = Math.round((done/total)*100) + '%';
    document.getElementById('progress-label').textContent = done + ' / ' + total;
    renderTable();
    updateSummary();
  }

  btn.textContent = 'Run again';
  btn.disabled = false;
}

function updateSummary(){
  var c = { ok:0, warn:0, err:0, skip:0 };
  allResults.forEach(function(r){ c[r.status]++; });
  document.getElementById('s-ok').textContent   = c.ok;
  document.getElementById('s-warn').textContent = c.warn;
  document.getElementById('s-err').textContent  = c.err;
  document.getElementById('s-skip').textContent = c.skip;
}

function renderTable(){
  var filtered = allResults.filter(function(r){
    if(currentFilter === 'all')   return true;
    if(currentFilter === 'indie') return !!r.game.isIndie;
    if(currentFilter === 'aaa')   return !r.game.isIndie;
    return r.status === currentFilter;
  });

  document.getElementById('results-body').innerHTML = filtered.map(function(r){
    var tag = r.game.isIndie ? '<span class="tag t-indie">Indie</span>' : '<span class="tag t-aaa">AAA</span>';
    var statusHtml = { ok:'<span class="status s-ok">Match</span>', warn:'<span class="status s-warn">Partial</span>', err:'<span class="status s-err">Wrong</span>', skip:'<span class="status s-skip">No data</span>' };
    var priceHtml = r.price ? '<span class="price">$'+parseFloat(r.price).toFixed(2)+'</span>' : '<span style="color:#78716c">not on sale</span>';
    return '<tr><td><span class="game-name">'+r.game.title+'</span>'+tag+'</td><td><span class="steam-id">'+r.game.steamId+'</span></td><td><span class="gg-name">'+(r.ggTitle||'—')+'</span></td><td>'+priceHtml+'</td><td>'+statusHtml[r.status]+'</td></tr>';
  }).join('');
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderTable();
}

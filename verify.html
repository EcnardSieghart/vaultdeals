  button.secondary { background: #292524; color: #fafaf9; border: 1px solid #3d3830; }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }

  .stat-pill.red { border-color: #dc2626; color: #f87171; }
  .stat-pill.amber { border-color: #d97706; color: #fbbf24; }
  .stat-pill.blue { border-color: #2563eb; color: #60a5fa; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1c1a17; padding: 10px 12px; text-align: left; font-size: 12px; color: #78716c; text-transform: uppercase; letter-spacing: .05em; position: sticky; top: 0; z-index: 10; }
  tr { border-bottom: 1px solid #1c1a17; }
  tr:hover { background: #1c1a17; }
  td { padding: 10px 12px; vertical-align: middle; }
  .game-title { font-weight: 600; color: #fafaf9; }
  .game-type { font-size: 11px; color: #78716c; margin-top: 2px; }
  .id-cell { font-family: monospace; font-size: 13px; }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .s-correct { background: #14532d; color: #4ade80; }
  .s-wrong { background: #7f1d1d; color: #f87171; }
  .s-nodata { background: #292524; color: #78716c; }
  .s-loading { background: #1e3a5f; color: #60a5fa; }
  .s-pending { background: #292524; color: #a8a29e; }
  .s-fixed { background: #1e3a5f; color: #93c5fd; }
  .gg-title { font-size: 12px; color: #a8a29e; }
  .price-cell { font-size: 13px; color: #4ade80; font-weight: 600; }
  .search-results { display: none; }
  .search-results.open { display: block; }
  .steam-matches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .steam-match { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: #1c1a17; border: 1px solid #3d3830; border-radius: 6px; padding: 6px; width: 120px; transition: border-color .15s; }
  .steam-match:hover { border-color: #f59e0b; }
  .steam-match.selected { border-color: #16a34a; background: #14532d22; }
  .steam-match img { width: 108px; height: 50px; object-fit: cover; border-radius: 3px; }
  .steam-match-title { font-size: 10px; color: #d6d3d1; text-align: center; line-height: 1.3; }
  .steam-match-id { font-size: 10px; color: #f59e0b; font-family: monospace; }

<body>

<h1>VaultDeals — Enhanced Game Verifier</h1>
<p class="subtitle">Auto-verifies IDs against GG.deals. Wrong/no-data games get Steam search to find correct ID.</p>

<div class="controls">
  <button onclick="startVerification()">▶ Verify All</button>
  <button class="secondary" onclick="verifyWrongOnly()">⚠ Re-check Wrong/No-data</button>
  <button class="secondary" onclick="autoFixAll()">🤖 Auto-fix All Wrong</button>
  <button class="secondary" onclick="generateOutput()">📋 Generate deals.js</button>
  <button class="secondary" onclick="copyOutput()">Copy Output</button>
  <span class="progress" id="progress"></span>
</div>

<div class="stats-bar" id="stats-bar">
  <span class="stat-pill green" id="stat-correct">✓ Correct: 0</span>
  <span class="stat-pill red" id="stat-wrong">✗ Wrong: 0</span>
  <span class="stat-pill" id="stat-nodata">— No data: 0</span>
  <span class="stat-pill blue" id="stat-fixed">★ Fixed: 0</span>
  <span class="stat-pill amber" id="stat-pending">⏳ Pending: 0</span>
</div>

<div class="filter-row">
  <button class="filter-btn secondary active" onclick="filterTable('all', this)">All</button>
  <button class="filter-btn secondary" onclick="filterTable('wrong', this)">Wrong only</button>
  <button class="filter-btn secondary" onclick="filterTable('nodata', this)">No data only</button>
  <button class="filter-btn secondary" onclick="filterTable('correct', this)">Correct only</button>
  <button class="filter-btn secondary" onclick="filterTable('fixed', this)">Fixed only</button>
</div>

<table id="game-table">
  <thead>
    <tr>
      <th>#</th>
      <th>Game</th>
      <th>Steam ID</th>
      <th>Status</th>
      <th>GG.deals Title / Price</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="game-tbody"></tbody>
</table>

<div class="copy-section">

  <textarea id="output" placeholder="Click 'Generate deals.js' after verification..."></textarea>
  <button onclick="copyOutput()" style="margin-top:8px;">Copy to clipboard</button>
</div>

// State
let results = {};
let fixedIds = {}; // steamId overrides from user clicking a Steam match
let running = false;

function updateStats() {
  const counts = { correct: 0, wrong: 0, nodata: 0, fixed: 0, pending: 0 };
  ALL_GAMES.forEach(g => {
    const id = g.steamId;
    if (fixedIds[id]) { counts.fixed++; return; }
    const r = results[id];
    if (!r) { counts.pending++; return; }
    if (r.status === 'correct') counts.correct++;
    else if (r.status === 'wrong') counts.wrong++;
    else if (r.status === 'nodata') counts.nodata++;
  });
  document.getElementById('stat-correct').textContent = `✓ Correct: ${counts.correct}`;
  document.getElementById('stat-wrong').textContent = `✗ Wrong: ${counts.wrong}`;
  document.getElementById('stat-nodata').textContent = `— No data: ${counts.nodata}`;
  document.getElementById('stat-fixed').textContent = `★ Fixed: ${counts.fixed}`;
  document.getElementById('stat-pending').textContent = `⏳ Pending: ${counts.pending}`;
}

function buildTable() {
  const tbody = document.getElementById('game-tbody');
  tbody.innerHTML = '';
  ALL_GAMES.forEach((game, idx) => {
    const effectiveId = fixedIds[game.steamId] || game.steamId;
    const r = results[game.steamId];
    const isFixed = !!fixedIds[game.steamId];

    let statusClass = 's-pending', statusText = 'Pending';
    if (isFixed) { statusClass = 's-fixed'; statusText = 'Fixed ★'; }
    else if (r) {
      if (r.status === 'correct') { statusClass = 's-correct'; statusText = 'Correct ✓'; }
      else if (r.status === 'wrong') { statusClass = 's-wrong'; statusText = 'Wrong ✗'; }
      else if (r.status === 'nodata') { statusClass = 's-nodata'; statusText = 'No data —'; }
      else if (r.status === 'loading') { statusClass = 's-loading'; statusText = 'Loading…'; }
    }

    const ggTitle = r ? (r.ggTitle || '') : '';
    const ggPrice = r ? (r.price || '') : '';

    const tr = document.createElement('tr');
    tr.id = `row-${game.steamId}`;
    tr.dataset.status = isFixed ? 'fixed' : (r ? r.status : 'pending');
    tr.dataset.type = game.isIndie ? 'indie' : 'aaa';
    tr.innerHTML = `
      <td style="color:#78716c;font-size:12px;">${idx + 1}</td>
      <td>
        <div class="game-title">${game.title}</div>
        <div class="game-type">${game.isIndie ? 'Indie' : 'AAA'} · $${game.originalPrice.toFixed(2)}</div>
      </td>
      <td class="id-cell">
        <span id="id-display-${game.steamId}">${effectiveId}</span>
      </td>
      <td><span class="status-badge ${statusClass}" id="badge-${game.steamId}">${statusText}</span></td>
      <td>
        <div class="gg-title" id="gg-${game.steamId}">${ggTitle}</div>
        <div class="price-cell" id="price-${game.steamId}">${ggPrice}</div>
      </td>
      <td>
        <div id="actions-${game.steamId}">
          ${(r && (r.status === 'wrong' || r.status === 'nodata')) || isFixed ? `
            <button class="secondary" style="font-size:11px;padding:3px 8px;" onclick="searchSteam('${game.steamId}', '${game.title.replace(/'/g,"\\'")}')">🔍 Find on Steam</button>
          ` : ''}
        </div>
        <div id="steam-results-${game.steamId}" class="search-results"></div>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateStats();
}

async function verifyGame(game) {
  const row = document.getElementById(`row-${game.steamId}`);
  if (row) row.dataset.status = 'loading';
  document.getElementById(`badge-${game.steamId}`).className = 'status-badge s-loading';
  document.getElementById(`badge-${game.steamId}`).textContent = 'Loading…';

  try {
    const effectiveId = fixedIds[game.steamId] || game.steamId;
    const res = await fetch(`/gg-api/v1/prices/by-steam-app-id/?key=${window.GGKEY}&ids=${effectiveId}&region=us`);
    const data = await res.json();

    if (!data.success || !data.data || !data.data[effectiveId]) {
      results[game.steamId] = { status: 'nodata', ggTitle: '', price: '' };
    } else {
      const info = data.data[effectiveId];
      const ggTitle = (info.title || '').toLowerCase();
      const gameTitle = game.title.toLowerCase();
      const words = gameTitle.split(' ').filter(w => w.length > 3);
      const match = words.some(w => ggTitle.includes(w));
      const currentPrice = info.prices?.currentRetail;
      const priceStr = currentPrice != null ? `$${parseFloat(currentPrice).toFixed(2)}` : 'not on sale';

      results[game.steamId] = {
        status: match ? 'correct' : 'wrong',
        ggTitle: info.title || '',
        price: priceStr
      };
    }
  } catch(e) {
    results[game.steamId] = { status: 'nodata', ggTitle: 'Error', price: '' };
  }

  updateRow(game);
}

function updateRow(game) {
  const r = results[game.steamId];
  const isFixed = !!fixedIds[game.steamId];
  const effectiveId = fixedIds[game.steamId] || game.steamId;

  let statusClass = 's-pending', statusText = 'Pending';
  if (isFixed) { statusClass = 's-fixed'; statusText = 'Fixed ★'; }
  else if (r.status === 'correct') { statusClass = 's-correct'; statusText = 'Correct ✓'; }
  else if (r.status === 'wrong') { statusClass = 's-wrong'; statusText = 'Wrong ✗'; }
  else if (r.status === 'nodata') { statusClass = 's-nodata'; statusText = 'No data —'; }

  document.getElementById(`badge-${game.steamId}`).className = `status-badge ${statusClass}`;
  document.getElementById(`badge-${game.steamId}`).textContent = statusText;
  document.getElementById(`id-display-${game.steamId}`).textContent = effectiveId;
  document.getElementById(`gg-${game.steamId}`).textContent = r.ggTitle || '';
  document.getElementById(`price-${game.steamId}`).textContent = r.price || '';

  const actions = document.getElementById(`actions-${game.steamId}`);
  if (r.status === 'wrong' || r.status === 'nodata' || isFixed) {
    actions.innerHTML = `<button class="secondary" style="font-size:11px;padding:3px 8px;" onclick="searchSteam('${game.steamId}', '${game.title.replace(/'/g,"\\'")}')">🔍 Find on Steam</button>`;
  } else {
    actions.innerHTML = '';
  }

  const row = document.getElementById(`row-${game.steamId}`);
  if (row) row.dataset.status = isFixed ? 'fixed' : r.status;
  updateStats();
}

async function searchSteam(originalId, title) {
  const resultsDiv = document.getElementById(`steam-results-${originalId}`);
  resultsDiv.classList.add('open');
  resultsDiv.innerHTML = `<div style="color:#78716c;font-size:12px;margin-top:6px;">Searching Steam for "${title}"…</div>
    <div class="search-input-row">
      <input type="text" id="manual-search-${originalId}" value="${title}" placeholder="Search Steam...">
      <button onclick="doSteamSearch('${originalId}')" style="font-size:11px;padding:4px 10px;">Search</button>
    </div>`;
  doSteamSearch(originalId);
}

async function doSteamSearch(originalId) {
  const input = document.getElementById(`manual-search-${originalId}`);
  const query = input ? input.value : ALL_GAMES.find(g => g.steamId === originalId)?.title || '';
  const resultsDiv = document.getElementById(`steam-results-${originalId}`);

  try {
    const res = await fetch(`/steam-api/api/storesearch/?term=${encodeURIComponent(query)}&cc=us&l=en`);
    const data = await res.json();
    const items = (data.items || []).slice(0, 5);

    if (!items.length) {
      resultsDiv.innerHTML += '<div style="color:#f87171;font-size:12px;margin-top:6px;">No Steam results. Try a different search term.</div>';
      return;
    }

    const matchesHtml = items.map(item => `
      <div class="steam-match" onclick="applyId('${originalId}', '${item.id}', this)">
        <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/${item.id}/capsule_sm_120.jpg" 
             onerror="this.style.display='none'" alt="">
        <div class="steam-match-title">${item.name}</div>
        <div class="steam-match-id">${item.id}</div>
      </div>
    `).join('');

    resultsDiv.innerHTML = `
      <div class="search-input-row" style="margin-top:6px;">
        <input type="text" id="manual-search-${originalId}" value="${query}" placeholder="Search Steam...">
        <button onclick="doSteamSearch('${originalId}')" style="font-size:11px;padding:4px 10px;">Search</button>
      </div>
      <div class="steam-matches">${matchesHtml}</div>
      <div style="margin-top:6px;font-size:11px;color:#78716c;">Click the correct game to apply its ID</div>
    `;
  } catch(e) {
    resultsDiv.innerHTML += `<div style="color:#f87171;font-size:12px;margin-top:6px;">Search failed: ${e.message}. Enter ID manually:</div>
  <div class="search-input-row" style="margin-top:4px;">
    <input type="text" id="manual-id-${originalId}" placeholder="Paste Steam App ID..." style="font-family:monospace;">
    <button onclick="applyManualId('${originalId}')" style="font-size:11px;padding:4px 10px;">Apply</button>
  </div>`;
  }
}

function applyManualId(originalId) {
  const input = document.getElementById(`manual-id-${originalId}`);
  if (!input || !input.value.trim()) return;
  const newId = input.value.trim().replace(/[^0-9]/g, '');
  if (!newId) { alert('Please enter a numeric Steam App ID'); return; }
  fixedIds[originalId] = newId;
  const game = ALL_GAMES.find(g => g.steamId === originalId);
  if (game) {
    results[originalId] = { status: 'fixed', ggTitle: 'Manually entered', price: '' };
    updateRow(game);
    setTimeout(() => verifyGame(game), 300);
  }
}

function applyId(originalId, newId, el) {
  // Mark as selected
  el.closest('.steam-matches').querySelectorAll('.steam-match').forEach(m => m.classList.remove('selected'));
  el.classList.add('selected');

  fixedIds[originalId] = newId;
  results[originalId] = { status: 'fixed', ggTitle: 'Manually fixed', price: '' };

  const game = ALL_GAMES.find(g => g.steamId === originalId);
  if (game) updateRow(game);

  // Re-verify with new ID
  setTimeout(() => verifyGame(game), 300);
}

async function startVerification() {
  if (running) return;
  running = true;

  // Get API key first
  try {
    const cfg = await fetch('/api/deals');
    const data = await cfg.json();
    window.GGKEY = data.apiKey;
  } catch(e) {
    alert('Could not load API key. Make sure you are running on vaultdeals.pages.dev');
    running = false;
    return;
  }

  buildTable();
  const prog = document.getElementById('progress');
  const total = ALL_GAMES.length;

  // Process in batches of 10
  for (let i = 0; i < ALL_GAMES.length; i += 10) {
    const batch = ALL_GAMES.slice(i, i + 10);
    await Promise.all(batch.map(g => verifyGame(g)));
    prog.textContent = `Verified ${Math.min(i + 10, total)} / ${total}`;
    await new Promise(r => setTimeout(r, 500));
  }

  prog.textContent = `Done! ${total} games checked.`;
  running = false;
}

async function autoFixAll() {
  if (!window.GGKEY) {
    try {
      const cfg = await fetch('/api/deals');
      const data = await cfg.json();
      window.GGKEY = data.apiKey;
    } catch(e) { alert('Could not load API key.'); return; }
  }

  const toFix = ALL_GAMES.filter(g => {
    const r = results[g.steamId];
    return r && (r.status === 'wrong' || r.status === 'nodata') && !fixedIds[g.steamId];
  });

  if (!toFix.length) { alert('No wrong/no-data games to fix!'); return; }

  const prog = document.getElementById('progress');
  prog.textContent = `Auto-fixing ${toFix.length} games...`;

  let fixed = 0, failed = 0;
  for (const game of toFix) {
    try {
      const res = await fetch(`/steam-api/api/storesearch/?term=${encodeURIComponent(game.title)}&cc=us&l=en`);
      const data = await res.json();
      const items = data.items || [];
      if (items.length > 0) {
        // Pick best match — exact title match preferred, otherwise top result
        const exact = items.find(i => i.name.toLowerCase() === game.title.toLowerCase());
        const best = exact || items[0];
        fixedIds[game.steamId] = String(best.id);
        results[game.steamId] = { status: 'fixed', ggTitle: best.name, price: '' };
        updateRow(game);
        fixed++;
      } else {
        failed++;
      }
    } catch(e) { failed++; }
    await new Promise(r => setTimeout(r, 150));
  }

  prog.textContent = `Auto-fix done: ${fixed} fixed, ${failed} not found. Now re-verifying...`;

  // Re-verify all fixed games
  const toVerify = ALL_GAMES.filter(g => fixedIds[g.steamId]);
  for (let i = 0; i < toVerify.length; i += 10) {
    await Promise.all(toVerify.slice(i, i+10).map(g => verifyGame(g)));
    await new Promise(r => setTimeout(r, 400));
  }
  prog.textContent = `Complete! Check results and manually fix any remaining wrong/no-data games.`;
}

async function verifyWrongOnly() {
  if (!window.GGKEY) {
    try {
      const cfg = await fetch('/api/deals');
      const data = await cfg.json();
      window.GGKEY = data.apiKey;
    } catch(e) { alert('Could not load API key.'); return; }
  }
  const toCheck = ALL_GAMES.filter(g => {
    const r = results[g.steamId];
    return !r || r.status === 'wrong' || r.status === 'nodata';
  });
  for (let i = 0; i < toCheck.length; i += 10) {
    const batch = toCheck.slice(i, i + 10);
    await Promise.all(batch.map(g => verifyGame(g)));
    await new Promise(r => setTimeout(r, 500));
  }
}

function filterTable(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#game-tbody tr').forEach(tr => {
    if (filter === 'all') { tr.style.display = ''; return; }
    tr.style.display = tr.dataset.status === filter ? '' : 'none';
  });
}

function generateOutput() {
  const lines = ['const TRACKED_GAMES = [', '', '  // ── AAA ──────────────────────────────────────────────────────────'];
  const aaa = ALL_GAMES.filter(g => !g.isIndie);
  const indie = ALL_GAMES.filter(g => g.isIndie);

  aaa.forEach(g => {
    const id = fixedIds[g.steamId] || g.steamId;
    const r = results[g.steamId];
    const status = r ? r.status : 'unverified';
    const comment = status === 'correct' ? '// verified' : status === 'nodata' ? '// no data' : status === 'wrong' ? '// NEEDS FIX' : '// unverified';
    lines.push(`  { steamId: '${id.padEnd(7)}', title: '${g.title.padEnd(36)}', genre: '${(g.genre || '').padEnd(16)}', originalPrice: ${g.originalPrice.toFixed(2)} }, ${comment}`);
  });

  lines.push('', '  // ── INDIE ────────────────────────────────────────────────────────');
  indie.forEach(g => {
    const id = fixedIds[g.steamId] || g.steamId;
    const r = results[g.steamId];
    const status = r ? r.status : 'unverified';
    const comment = status === 'correct' ? '// verified' : status === 'nodata' ? '// no data' : status === 'wrong' ? '// NEEDS FIX' : '// unverified';
    lines.push(`  { steamId: '${id.padEnd(7)}', title: '${g.title.padEnd(36)}', genre: '${(g.genre || '').padEnd(16)}', originalPrice: ${g.originalPrice.toFixed(2)}, isIndie: true }, ${comment}`);
  });

  lines.push('', '];');
  document.getElementById('output').value = lines.join('\n');
}

function copyOutput() {
  const ta = document.getElementById('output');
  ta.select();
  document.execCommand('copy');
  alert('Copied to clipboard!');
}

// Init table on load
buildTable();
